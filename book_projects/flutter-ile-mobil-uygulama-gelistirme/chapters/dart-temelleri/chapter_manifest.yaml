chapter:
  title: Flutter İçin Dart Temelleri
  alias: dart-temelleri
  order: 2
  references:
  - alias: giris
    relation: prerequisite
  - alias: widget-mantigi
    relation: next
scope:
  topics:
  - Dart değişkenleri
  - final ve const
  - Null-safety
  - List ve Map
  - Fonksiyonlar
  - Class ve constructor
  - Future, async ve await
  - Model sınıfı tasarımı
  objectives:
  - Okuyucu Flutter kodlarını anlayacak düzeyde Dart sözdizimini kullanabilmeli.
  - Null-safety mantığını örneklerle uygulayabilmeli.
  - Basit model sınıfları ve async veri akışı oluşturabilmeli.
  exclusions:
  - Dart isolate ve ileri eşzamanlılık
  - Metaprogramlama
  - Dart package geliştirme
  mini_project: Dart model sınıfından beslenen basit liste ekranı
