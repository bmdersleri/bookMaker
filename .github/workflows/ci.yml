# =============================================================================
# bookMaker — CI Workflow
# Her push ve PR'de: lint + test + prompt validation
# =============================================================================
name: CI

on:
  push:
    branches: [main, deepseek]
  pull_request:
    branches: [main, deepseek]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.9"

      - name: Setup Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check src/

      - name: Unit tests (pytest)
        run: uv run pytest tests/ -q --tb=short

      - name: Prompt validation
        run: uv run python tools/validate_prompt_changes.py
