# =============================================================================
# bookMaker — CI Workflow
# Her push ve PR'de: lint + test + prompt validation + book check
# =============================================================================
name: CI

on:
  push:
    branches:
      - main
      - deepseek
      - "feat/**"
      - "fix/**"
  pull_request:
    branches:
      - main
      - deepseek
      - "feat/**"
      - "fix/**"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.9"

      - name: Setup Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Unit tests
        run: uv run pytest tests/ -q --tb=short

      - name: Prompt validation
        run: |
          if [ -f tools/validate_prompt_changes.py ]; then
            uv run python tools/validate_prompt_changes.py
          else
            echo "tools/validate_prompt_changes.py bulunamadi, atlaniyor."
          fi

      - name: Validate sample Flutter book project
        run: |
          if [ -d book_projects/flutter-ile-mobil-uygulama-gelistirme ]; then
            uv run bookmaker check book book_projects/flutter-ile-mobil-uygulama-gelistirme --json
          else
            echo "Ornek Flutter kitap projesi bulunamadi, atlaniyor."
          fi
