# =============================================================================
# bookMaker — GitHub Pages Deploy Workflow
# Tetik: her push -> deepseek branch
# Is: pandoc ile HTML build -> gh-pages branch'ine deploy
# =============================================================================
name: Deploy GitHub Pages

on:
  push:
    branches: [deepseek]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Build HTML
        run: python tools/build/pages_build.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
